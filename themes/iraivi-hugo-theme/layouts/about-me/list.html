{{ define "main" }}

<section class="about-page section">
    <div class="container">
        <div class="section-heading text-center mx-auto">
            <span class="section-kicker">About Gayathri</span>
            <h1>{{ .Title }}</h1>
        </div>
        <div class="row g-5 align-items-center mt-2">
            <div class="col-lg-5">
                {{ with .Params.image }}
                <img src="{{ . | relURL }}" class="img-fluid about-page__image" alt="{{ $.Title }}">
                {{ end }}
            </div>
            <div class="col-lg-7">
                <div class="content-card">
                    {{ .Content }}
                </div>
            </div>
        </div>
    </div>
</section>

{{ end }}
