{{ define "main" }}

<header class="about__header d-flex align-items-end">
    <div class="container">

        <h1 class="display-3">About me</h1>

    </div>
</header>
<section class="about py-section">
    <div class="container">

        <div class="row">
            <div class="col-md-4 mb-4 mb-md-0">
                {{ with .Params.image }}
                <img src="{{ . | relURL }}" class="img-fluid rounded-3" alt="{{ $.Title }}">
                {{ end }}
            </div>
            <div class="col-md-8">{{ .Content }}</div>
        </div>
        <div class="row">
            <div class="col-md-6 mx-auto">
                <blockquote>Giving birth should be your greatest achievement not your greatest fear</blockquote>
            </div>
        </div>
    </div>
</section>

{{ end }}
