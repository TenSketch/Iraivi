{{ define "main" }}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <p class="text-uppercase small mb-2">Form</p>
                        <h1 class="mb-3">{{ .Title }}</h1>
                        {{ with .Params.description }}
                        <p class="lead">{{ . }}</p>
                        {{ end }}
                        {{ with .Params.image }}
                        <img src="{{ . | relURL }}" class="img-fluid rounded-3 mb-4" alt="{{ $.Title }}">
                        {{ end }}
                        <div class="content">
                            {{ .Content | safeHTML }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{{ end }}
