{{ define "main" }}
<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <h1 class="mb-3">{{ .Title }}</h1>
                {{ with .Params.image }}
                <img src="{{ . | relURL }}" class="img-fluid rounded-3 mb-4" alt="{{ $.Title }}">
                {{ end }}
                <div class="content">
                    {{ .Content }}
                </div>
            </div>
        </div>
    </div>
</section>
{{ end }}
