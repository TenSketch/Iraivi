{{ with site.Data.home.about }}
{{ if .enable }}
<section id="about" class="section section--medium about-minimal">
  <div class="container">
    <div class="row align-items-center g-5">
      <div class="col-lg-7">
        <img src="{{ .image | relURL }}" class="img-fluid about-minimal__image" alt="{{ .title }}" loading="lazy" decoding="async">
      </div>
      <div class="col-lg-5">
        <p class="section-kicker">About Gayathri</p>
        <h2 class="section-title">{{ .title }}</h2>
        <p class="section-copy">{{ .intro }}</p>
        <div class="about-minimal__credentials">
          {{ range .credentials }}
          <span>{{ . }}</span>
          {{ end }}
        </div>
        <a href="{{ .cta_link | relURL }}" class="btn btn_primary btn-pill">Read more</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
{{ end }}
