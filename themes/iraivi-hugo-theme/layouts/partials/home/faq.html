{{ with site.Data.home.faq }}
<section id="faq" class="section faq-section">
  <div class="container">
    <div class="section-heading text-center mx-auto">
      <span class="section-kicker">FAQ</span>
      <h2>{{ .title }}</h2>
      <p>{{ .intro }}</p>
    </div>
    <div class="accordion faq-accordion mt-4" id="homeFaq">
      {{ range $index, $item := .items }}
      {{ $collapseID := printf "faqCollapse%d" $index }}
      {{ $headingID := printf "faqHeading%d" $index }}
      <div class="accordion-item">
        <h3 class="accordion-header" id="{{ $headingID }}">
          <button class="accordion-button {{ if ne $index 0 }}collapsed{{ end }}" type="button" data-bs-toggle="collapse" data-bs-target="#{{ $collapseID }}" aria-expanded="{{ if eq $index 0 }}true{{ else }}false{{ end }}" aria-controls="{{ $collapseID }}">
            {{ $item.question }}
          </button>
        </h3>
        <div id="{{ $collapseID }}" class="accordion-collapse collapse {{ if eq $index 0 }}show{{ end }}" aria-labelledby="{{ $headingID }}" data-bs-parent="#homeFaq">
          <div class="accordion-body">
            {{ $item.answer }}
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
