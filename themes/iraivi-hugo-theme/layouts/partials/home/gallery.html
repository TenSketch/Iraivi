{{ with site.Data.home.gallery }}
{{ if .enable }}
<section class="section section--medium gallery-section">
  <div class="container">
    <div class="section-heading">
      <p class="section-kicker">Image gallery</p>
      <h2 class="section-title">{{ .title }}</h2>
    </div>
    <div class="gallery-grid">
      {{ range .items }}
      <div class="gallery-card">
        <img src="{{ .image | relURL }}" alt="{{ .title }}" loading="lazy" decoding="async">
        <span>{{ .title }}</span>
        <em>{{ .caption }}</em>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
{{ end }}
