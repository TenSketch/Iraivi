items:
  - slug: "preethi-m"
    name: "Preethi M"
    focus: "Labour Management and Breastfeeding Sessions"
    quote: "I attended the labour management session in September 2023 and the breastfeeding session in October 2023. As a first-time mom, I had zero knowledge about labour. Your session made me feel more relaxed and gave me confidence about my labour. It covered everything from pre-labour care to postpartum care in a simple and understandable way. Your breathing technique helped a lot during my labour. Within 30 minutes I delivered my baby girl vaginally without epidural and breastfed my baby within one hour. Thank you so much for being with me throughout my pregnancy."
  - slug: "milton-jenisha"
    name: "Milton Jenisha"
    focus: "Breastfeeding Support"
    quote: "I struggled a lot with breastfeeding my newborn and joined the class when my son was 20 days old. She explained everything from scratch and cleared all my doubts. I highly recommend her class for new and expecting mommies."
  - slug: "anonymous-labour-breastfeeding"
    name: "Anonymous"
    focus: "Labour Management and Breastfeeding Session"
    quote: "As a first-time mom near my due date, I was confused and afraid after hearing so many things about breastfeeding. I had already attended the labour management session twice and learned a lot, so I joined the breastfeeding class too. The teaching was easy to understand, I learned many techniques, and I overcame many myths. After the class I gained confidence to breastfeed my little one, and even my mom's doubts were cleared."
  - slug: "anonymous-nov-2023"
    name: "Anonymous"
    focus: "November 2023 Labour Management Session"
    quote: "I attended the session in my 33rd week and it was truly helpful and very informative. I felt I attended it at the right time. I was clueless regarding labour and the procedure, but now I have a clear picture of what to expect. This knowledge is necessary for any pregnant woman so she understands the options in front of her."
  - slug: "aanisha"
    name: "Aanisha"
    focus: "Birth Preparation"
    quote: "As a first-time mom, I did not know anything about birth experience or labour pain. These sessions were very useful and helped me gain knowledge about labour pain, ways to overcome those challenges, and how the postpartum phase may feel. The explanation was simple and easy to understand, and that made the session very useful for me."
  - slug: "devi-kamatchi"
    name: "Devi Kamatchi"
    focus: "Labour Management Session"
    quote: "The session was too good and informative. It made me feel more confident and relaxed. With all the techniques and knowledge provided, I attained the confidence that me and my little one will have a healthy pregnancy. Thank you so much for your patience in clearing all doubts and fears."
  - slug: "nandhini"
    name: "Nandhini"
    focus: "Labour Preparation"
    quote: "Thank you so much for your informative and reassuring session. I feel more positive and stress-free about my labour now. I gained more knowledge about labour types, pain coping techniques, and approaches that will be very helpful for my labour."
  - slug: "ramya-sudhan"
    name: "Ramya Sudhan"
    focus: "Webinar Feedback"
    quote: "The webinar was very useful and informative. Mam was extremely polite and patient with all my queries. She guided me and supported me to overcome my fear, which gave me confidence. I was impressed with my experience, especially the visualisation session, and I confidently suggest this centre."
  - slug: "sadhana-b"
    name: "Sadhana B"
    focus: "Pregnancy and Birth Education"
    quote: "Unlike usual labour classes, your sessions were more useful in helping me understand the pre and post delivery process. You were kind and patient in clarifying all my doubts and guiding me towards solutions. I strongly recommend all moms-to-be to take your classes and gain a deeper understanding of pregnancy and its process."
  - slug: "janane-gg"
    name: "Janane G G"
    focus: "One-to-One Newborn Care Session"
    quote: "I attended the one-to-one newborn care session. It gave me insights into handling a newborn, breastfeeding, and the postpartum phase that every first-time mom should know. In a society where everyone gives free advice, these classes are important to educate new moms on myths, facts, dos and don'ts. She is friendly, clears all doubts, and is available to help anytime."
  - slug: "valli-ravikumar"
    name: "Valli Ravikumar"
    focus: "Breastfeeding Guidance"
    quote: "As a new mom, I had lots of doubts about breastfeeding. With so much patience, Gayathri akka explained everything in detail. She was always there to help and sort out every issue regarding breastfeeding. Thanks is just a small word."
  - slug: "gifty"
    name: "Gifty"
    focus: "December Labour Management Batch"
    quote: "The session was very informative and an eye opener. I learned many important things, including what we should ask the doctor first hand. You were very patient and answered all our questions. I regret not knowing you in my first pregnancy, but I am glad I found you now and I feel much more relaxed."
  - slug: "ramya-cbe"
    name: "Ramya (CBE)"
    focus: "Labour Management Two-Day Session"
    quote: "It is very important for women to go through a positive birth story, and Iraivi Pregnancy Care truly lives up to its name. I attended the two-day labour management session and it was fully packed with labour preparation. All pain coping techniques and breathing exercises were explained very clearly. Now I am much more relaxed and confident about going through delivery positively."
  - slug: "priyanka-saravanan"
    name: "Priyanka Saravanan"
    focus: "December 2023 Batch"
    quote: "I wanted someone friendly and kind to teach me labour management so I would feel comfortable asking doubts. Mrs Gayathri did a beautiful job. She kept checking whether we understood each topic, discussed everything in depth, and made me feel confident about what would happen in the labour room. Every pregnant woman should attend this class and be aware of the birthing process."
  - slug: "prithvis-love"
    name: "prithvis_love"
    focus: "Labour Management Class"
    quote: "Thank you so much for your labour management class. I am really glad I got the opportunity to receive your guidance. I truly wish many expecting couples would attend your session and benefit from it. I felt very positive after meeting you."
  - slug: "revathi"
    name: "Revathi"
    focus: "Webinar Feedback"
    quote: "You explained each and every topic we needed in detail and cleared all our doubts, which was the most appreciable part. Thank you so much. Keep doing your wonderful work and all the best for your growth and success."
  - slug: "purva-ingale"
    name: "Purva Ingale"
    focus: "Positive Labour Preparation"
    quote: "Thank you for an amazing session. It was truly helpful and enlightening. You explained different aspects of labour, what I may encounter, and how to face it fearlessly with minimal suffering. You beautifully explained how labour is not something to fear, and now I am looking forward to this positive experience."
  - slug: "dr-rathinapriya"
    name: "Dr. P. Rathinapriya"
    focus: "Labour Management Training"
    quote: "The session was extremely informative. You explained each and every aspect of labour management in depth. I gained lots of knowledge regarding childbirth, and the way you clarified doubts promptly made us feel comfortable while learning. Keep up the good work and continue making a positive change through your training."
  - slug: "priya-chennai"
    name: "Priya - Chennai"
    focus: "Labour Management Session"
    quote: "I attended your labour management session recently and it was a wonderful session. The class was power packed with useful information. I used to think we could google everything we need, but this class proved me wrong because it was not only about knowledge, it was also about creating emotional connection with our baby. It gave me confidence and helped me better understand pregnancy and labour management."
