faq:
  enable: true
  title: "FAQ"
  items:
    - question: "How do I register?"
      answer: "Book through the course enrollment form or the lactation consultation page, depending on your need."
    - question: "Are sessions online?"
      answer: "Yes, sessions are online and easy to join."
    - question: "When should I start?"
      answer: "You can start anytime, but many parents begin in the second trimester."
    - question: "Is this one-on-one or group based?"
      answer: "Both options are available depending on the course."
    - question: "How will I hear back after booking?"
      answer: "We will respond to your submission by email with the next steps."

