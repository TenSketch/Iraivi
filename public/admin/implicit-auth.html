<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Decap CMS Authentication</title>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const accessToken = params.get('access_token');
    if (accessToken) {
      localStorage.setItem('token', accessToken);
      window.close();
    }
  </script>
</body>
</html>
