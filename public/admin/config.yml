backend:
  name: github
  repo: TenSketch/Iraivi
  branch: main
  site_url: https://birthwithiraivi.com

local_backend: true
publish_mode: editorial_workflow

# Decap CMS authenticates through the GitHub OAuth bridge hosted on the VPS.
site_url: https://birthwithiraivi.com
display_url: https://birthwithiraivi.com

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Home"
    files:
      - name: "home_data"
        label: "Home Data"
        file: "data/home.yml"
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - label: Enable
                name: enable
                widget: boolean
                required: false
              - label: Slides
                name: slides
                widget: list
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: Headline, name: headline, widget: string }
                  - { label: Caption, name: caption, widget: text, required: false }
                  - { label: CTA Label, name: cta_label, widget: string, required: false }
                  - { label: CTA Link, name: cta_link, widget: string, required: false }

          - label: Story Banner
            name: story_banner
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: Text, name: text, widget: text, required: false }
              - { label: CTA Label, name: cta_label, widget: string, required: false }
              - { label: CTA Link, name: cta_link, widget: string, required: false }

          - label: About
            name: about
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Intro, name: intro, widget: text, required: false }
              - label: Credentials
                name: credentials
                widget: list
                field: { label: Credential, name: item, widget: string }
              - { label: CTA Label, name: cta_label, widget: string, required: false }
              - { label: CTA Link, name: cta_link, widget: string, required: false }

          - label: Gallery
            name: gallery
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Image, name: image, widget: image }
                  - { label: Caption, name: caption, widget: text, required: false }
                  - { label: Link, name: link, widget: string, required: false }

          - label: Courses
            name: courses
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Intro, name: intro, widget: text, required: false }
              - { label: CTA Label, name: cta_label, widget: string, required: false }
              - { label: View All Label, name: view_all_label, widget: string, required: false }
              - { label: Featured Limit, name: featured_limit, widget: number, required: false, value_type: int, min: 1, max: 12 }

          - label: Journey
            name: journey
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - label: Steps
                name: steps
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Image, name: image, widget: image }
                  - { label: Text, name: text, widget: text }

          - label: Testimonials
            name: testimonials
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Image, name: image, widget: image }
                  - { label: Quote, name: quote, widget: text }
                  - { label: Link Label, name: link_label, widget: string, required: false }
                  - { label: Link, name: link, widget: string, required: false }

          - label: FAQ
            name: faq
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Question, name: question, widget: string }
                  - { label: Answer, name: answer, widget: text }

          - label: Lactation Promo
            name: lactation_promo
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Intro, name: intro, widget: text, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: CTA Label, name: cta_label, widget: string, required: false }
              - { label: CTA Link, name: cta_link, widget: string, required: false }

          - label: Final Banner
            name: final_banner
            widget: object
            fields:
              - { label: Enable, name: enable, widget: boolean, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Subtext, name: subtext, widget: text, required: false }
              - { label: CTA Label, name: cta_label, widget: string, required: false }
              - { label: CTA Link, name: cta_link, widget: string, required: false }
              - { label: Secondary Label, name: secondary_label, widget: string, required: false }
              - { label: Secondary Link, name: secondary_link, widget: string, required: false }

  - name: "courses"
    label: "Courses"
    folder: "content/courses"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    media_folder: ""
    public_folder: ""
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Duration, name: duration, widget: string, required: false }
      - { label: Price, name: price, widget: string, required: false }
      - { label: Qatar Price, name: qatar_price, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Slug, name: slug, widget: string }
      - { label: Weight, name: weight, widget: number, required: false, value_type: int }
      - { label: Category, name: category, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, required: false }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - { label: Date, name: date, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: "enquiry"
    label: "Enquiry"
    folder: "content/enquiry"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    media_folder: ""
    public_folder: ""
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Layout, name: layout, widget: hidden, default: "form" }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Slug, name: slug, widget: string }
      - { label: Weight, name: weight, widget: number, required: false, value_type: int }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
      - { label: Show in Enquiry, name: show_in_enquiry, widget: boolean, required: false }
      - { label: Date, name: date, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: "pages"
    label: "Pages"
    files:
      - name: "about_me"
        label: "About Me"
        file: "content/about-me/_index.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Image, name: image, widget: image, required: false }
          - label: Tags
            name: tags
            widget: list
            field: { label: Tag, name: tag, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Keywords, name: keywords, widget: text, required: false }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Draft, name: draft, widget: boolean, required: false }
          - { label: Body, name: body, widget: markdown, required: false }

      - name: "courses_index"
        label: "Courses Index"
        file: "content/courses/_index.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Image, name: image, widget: image, required: false }
          - label: Tags
            name: tags
            widget: list
            field: { label: Tag, name: tag, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Keywords, name: keywords, widget: text, required: false }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Draft, name: draft, widget: boolean, required: false }
          - { label: Body, name: body, widget: markdown, required: false }

      - name: "enquiry_index"
        label: "Enquiry Index"
        file: "content/enquiry/_index.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Image, name: image, widget: image, required: false }
          - label: Tags
            name: tags
            widget: list
            field: { label: Tag, name: tag, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Keywords, name: keywords, widget: text, required: false }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Draft, name: draft, widget: boolean, required: false }
          - { label: Body, name: body, widget: markdown, required: false }

      - name: "lactation_consultation"
        label: "Lactation Consultation"
        file: "content/lactation-consultation.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Layout, name: layout, widget: hidden, default: "lactation-consultation" }
          - { label: Image, name: image, widget: image, required: false }
          - { label: Duration, name: duration, widget: string, required: false }
          - { label: Price, name: price, widget: string, required: false }
          - { label: Qatar Price, name: qatar_price, widget: string, required: false }
          - { label: Mode, name: mode, widget: string, required: false }
          - label: Accordion Sections
            name: accordion_sections
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: markdown }
          - label: Aliases
            name: aliases
            widget: list
            field: { label: Alias, name: alias, widget: string }
          - { label: Draft, name: draft, widget: boolean, required: false }
          - { label: Body, name: body, widget: markdown, required: false }

      - name: "testimonials"
        label: "Testimonials"
        file: "content/testimonials/_index.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Draft, name: draft, widget: boolean, required: false }
          - { label: Body, name: body, widget: markdown, required: false }
